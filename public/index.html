<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AI Třídič Faktur</title>
    <style>
      :root {
        --bg: #f2f2f7;
        --bg-2: #e5e5ea;
        --card: rgba(255, 255, 255, 0.78);
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: rgba(60, 60, 67, 0.18);
        --accent: #0a84ff;
        --accent-strong: #0071e3;
        --danger: #ff3b30;
        --ok-bg: rgba(52, 199, 89, 0.18);
        --ok-text: #1d7f40;
        --shadow: 0 20px 45px rgba(0, 0, 0, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        background:
          radial-gradient(1200px 500px at -10% -10%, #ffffff, transparent 50%),
          radial-gradient(900px 380px at 110% 0%, #dce9ff, transparent 48%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .card {
        width: min(900px, 100%);
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 24px;
        padding: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px) saturate(150%);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.35rem, 2.8vw, 1.95rem);
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .auth-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .status-pill {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(120, 120, 128, 0.16);
        font-size: 0.88rem;
      }

      .status-pill.ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      input, button {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
        padding: 12px 14px;
        font: inherit;
        transition: 180ms ease;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        font-weight: 590;
        cursor: pointer;
      }

      button[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }

      input:focus {
        outline: none;
        border-color: rgba(10, 132, 255, 0.6);
        box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.15);
      }

      button:not([disabled]):hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      .result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(10, 132, 255, 0.1);
        border: 1px solid rgba(10, 132, 255, 0.15);
        white-space: pre-wrap;
        font-size: 0.92rem;
      }

      .error {
        background: rgba(255, 59, 48, 0.12);
        border-color: rgba(255, 59, 48, 0.3);
        color: #8a1c16;
      }

      .groups {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .batch-controls {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .batch-actions {
        display: flex;
        gap: 10px;
      }

      .group {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.6);
      }

      .group h3 {
        margin: 0 0 6px;
      }

      .group-header {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .group-header input {
        flex: 1;
        min-width: 180px;
        font-size: 0.88rem;
        padding: 8px 12px;
        border-radius: 10px;
      }

      .group-send-btn {
        border: 0;
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 8px 16px;
        font-size: 0.88rem;
        font-weight: 600;
        width: auto;
        white-space: nowrap;
      }

      .group.group-sent {
        border-color: rgba(52, 199, 89, 0.4);
        background: rgba(52, 199, 89, 0.06);
      }

      .group-sent-label {
        font-size: 0.85rem;
        color: var(--ok-text);
        font-weight: 600;
      }

      .item {
        display: grid;
        gap: 8px;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        border-top: 1px solid rgba(60, 60, 67, 0.12);
        padding: 10px 0;
      }

      .item:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .file-name {
        font-weight: 600;
        font-size: 0.95rem;
      }

      .subject {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .subject-editor {
        margin-top: 6px;
      }

      .item-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .item-check {
        width: auto;
      }

      .subject-btn {
        border: 1px solid rgba(10, 132, 255, 0.3);
        background: rgba(10, 132, 255, 0.12);
        color: #0a4c8a;
        border-radius: 12px;
        padding: 8px 12px;
        font-size: 0.88rem;
        width: auto;
      }

      .send-btn {
        border: 0;
        background: var(--accent);
        color: #fff;
        border-radius: 12px;
        padding: 8px 12px;
        font-size: 0.88rem;
        width: auto;
      }

      .remove-btn {
        border: 1px solid rgba(255, 59, 48, 0.35);
        background: rgba(255, 59, 48, 0.1);
        color: #a32018;
        border-radius: 12px;
        padding: 8px 12px;
        font-size: 0.88rem;
        width: auto;
      }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .drop-zone {
        border: 2px dashed var(--line);
        border-radius: 16px;
        padding: 32px 20px;
        text-align: center;
        cursor: pointer;
        transition: 200ms ease;
        background: rgba(255, 255, 255, 0.4);
      }

      .drop-zone:hover {
        border-color: rgba(10, 132, 255, 0.4);
        background: rgba(10, 132, 255, 0.04);
      }

      .drop-zone.dragover {
        border-color: var(--accent);
        background: rgba(10, 132, 255, 0.08);
        transform: scale(1.01);
      }

      .drop-zone-icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      .drop-zone-text {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .drop-zone-text strong {
        color: var(--accent);
      }

      .drop-zone-files {
        margin-top: 10px;
        font-size: 0.85rem;
        color: var(--text);
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
      }

      .pending-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(10, 132, 255, 0.1);
        border: 1px solid rgba(10, 132, 255, 0.2);
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text);
      }

      .pending-chip button {
        all: unset;
        cursor: pointer;
        font-size: 0.9rem;
        line-height: 1;
        color: var(--muted);
        padding: 0 2px;
        border-radius: 50%;
      }

      .pending-chip button:hover {
        color: var(--danger);
      }

      .file-count {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 999px;
        background: rgba(10, 132, 255, 0.12);
        color: var(--accent-strong);
        font-size: 0.85rem;
        font-weight: 600;
        margin-top: 14px;
      }

      .select-all-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--muted);
      }

      .select-all-row input {
        width: auto;
      }

      .item.sent {
        background: var(--ok-bg);
        border-radius: 12px;
        padding: 10px 8px;
        margin: 4px -8px;
      }

      .sent-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--ok-bg);
        color: var(--ok-text);
        font-size: 0.78rem;
        font-weight: 600;
        margin-left: 8px;
      }

      @media (max-width: 640px) {
        .item {
          grid-template-columns: auto 1fr;
        }

        .batch-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>AI Třídič Faktur</h1>
      <p>Nahraj více faktur. AI je roztřídí podle firmy a navrhne předmět pro každý soubor.</p>

      <div class="auth-row">
        <button id="loginBtn" type="button">Přihlásit Microsoft</button>
        <button id="logoutBtn" type="button" style="display:none; background:#475569;">Odhlásit</button>
        <span id="authStatus" class="status-pill">Neověřeno</span>
      </div>

      <form id="sort-form">
        <input id="files" name="files" type="file" accept="application/pdf,image/*" multiple style="display:none;" />

        <div id="dropZone" class="drop-zone">
          <div class="drop-zone-icon">&#128193;</div>
          <div class="drop-zone-text">
            Přetáhni faktury sem nebo <strong>klikni pro výběr</strong><br>
            PDF a obrázky &middot; můžeš nahrávat postupně z různých složek
          </div>
          <div id="dropZoneFiles" class="drop-zone-files"></div>
        </div>

        <button id="sortBtn" type="submit">Přidat a roztřídit faktury</button>
      </form>

      <div id="result" class="result" style="display:none;"></div>

      <div id="fileCount" class="file-count" style="display:none;"></div>

      <div id="selectAllRow" class="select-all-row" style="display:none;">
        <input type="checkbox" id="selectAll" />
        <label for="selectAll">Vybrat vše</label>
      </div>

      <div id="groups" class="groups"></div>

      <div id="clearAllWrap" style="display:none; margin-top:14px;">
        <div class="batch-actions">
          <button id="removeSelectedBtn" class="remove-btn" type="button" disabled>Odebrat vybrané</button>
          <button id="clearAllBtn" type="button" class="remove-btn" style="width:auto;">Smazat vše</button>
        </div>
      </div>

      <div id="batchControls" class="batch-controls" style="display:none;">
        <div>
          <label for="commonSubject">Společný předmět pro vybrané soubory</label>
          <input id="commonSubject" type="text" maxlength="120" placeholder="Např. Faktury únor 2026" />
        </div>
        <button id="sendSelectedBtn" type="button" disabled>Odeslat vybrané na faktury</button>
      </div>
    </main>

    <script>
      const form = document.getElementById('sort-form');
      const result = document.getElementById('result');
      const groupsEl = document.getElementById('groups');
      const sortBtn = document.getElementById('sortBtn');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const authStatus = document.getElementById('authStatus');
      const filesInput = document.getElementById('files');
      const dropZone = document.getElementById('dropZone');
      const dropZoneFiles = document.getElementById('dropZoneFiles');
      const commonSubjectInput = document.getElementById('commonSubject');
      const sendSelectedBtn = document.getElementById('sendSelectedBtn');
      const removeSelectedBtn = document.getElementById('removeSelectedBtn');
      const batchControls = document.getElementById('batchControls');
      const clearAllBtn = document.getElementById('clearAllBtn');
      const clearAllWrap = document.getElementById('clearAllWrap');
      const fileCountEl = document.getElementById('fileCount');
      const selectAllRow = document.getElementById('selectAllRow');
      const selectAllCb = document.getElementById('selectAll');
      let isLoggedIn = false;
      const sentIds = new Set();
      let pendingFiles = [];

      function showResult(text, isError = false) {
        result.textContent = text;
        result.style.display = 'block';
        result.classList.toggle('error', isError);
      }

      async function parseApiResponse(response) {
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          return response.json();
        }

        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch {
          return {
            error: text ? `Server nevrátil JSON: ${text.slice(0, 200)}` : 'Server nevrátil JSON odpověď.',
          };
        }
      }

      function updateFileCount(total) {
        if (total > 0) {
          fileCountEl.textContent = `${total} ${total === 1 ? 'faktura' : total < 5 ? 'faktury' : 'faktur'} v seznamu`;
          fileCountEl.style.display = 'inline-block';
        } else {
          fileCountEl.style.display = 'none';
        }
      }

      function updateSelectAll() {
        const all = document.querySelectorAll('.item-check');
        const checked = document.querySelectorAll('.item-check:checked');
        selectAllCb.checked = all.length > 0 && checked.length === all.length;
        selectAllCb.indeterminate = checked.length > 0 && checked.length < all.length;
      }

      function markAsSent(fileId, row) {
        sentIds.add(fileId);
        row.classList.add('sent');
        const nameEl = row.querySelector('.file-name');
        if (nameEl && !nameEl.querySelector('.sent-badge')) {
          const badge = document.createElement('span');
          badge.className = 'sent-badge';
          badge.textContent = 'Odesláno';
          nameEl.appendChild(badge);
        }
      }

      function markGroupSent(section, groupSendBtn, groupSubjectInput) {
        section.classList.add('group-sent');
        groupSendBtn.disabled = true;
        groupSendBtn.textContent = 'Odesláno';
        groupSubjectInput.disabled = true;
        section.querySelectorAll('.item').forEach((row) => {
          const fid = row.dataset.fileId;
          if (fid) markAsSent(fid, row);
        });
      }

      function renderGroups(groups) {
        groupsEl.innerHTML = '';
        batchControls.style.display = 'none';
        let totalFiles = 0;

        for (const group of groups) {
          const section = document.createElement('section');
          section.className = 'group';
          const allGroupSent = group.files.every((f) => sentIds.has(f.id));
          if (allGroupSent) section.classList.add('group-sent');

          const heading = document.createElement('h3');
          heading.textContent = `${group.company} (${group.files.length})`;
          section.appendChild(heading);

          const groupHeader = document.createElement('div');
          groupHeader.className = 'group-header';

          const groupSubjectInput = document.createElement('input');
          groupSubjectInput.type = 'text';
          groupSubjectInput.maxLength = 120;
          groupSubjectInput.placeholder = 'Předmět e-mailu pro skupinu';
          groupSubjectInput.value = `Faktury \u2013 ${group.company}`;
          if (allGroupSent) groupSubjectInput.disabled = true;

          const groupSendBtn = document.createElement('button');
          groupSendBtn.type = 'button';
          groupSendBtn.className = 'group-send-btn';
          groupSendBtn.textContent = allGroupSent ? 'Odesláno' : `Odeslat skupinu (${group.files.length})`;
          groupSendBtn.disabled = !isLoggedIn || allGroupSent;

          const groupFileIds = group.files.map((f) => f.id);
          groupSendBtn.addEventListener('click', async () => {
            const original = groupSendBtn.textContent;
            groupSendBtn.disabled = true;
            groupSendBtn.textContent = 'Odesílám...';
            try {
              const response = await fetch('/api/send-batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  ids: groupFileIds,
                  subject: groupSubjectInput.value || '',
                }),
              });
              const data = await parseApiResponse(response);
              if (!response.ok) {
                throw new Error(data.error || 'Odeslání skupiny selhalo');
              }
              markGroupSent(section, groupSendBtn, groupSubjectInput);
              showResult(`Odesláno ${data.count} soubor\u016f (${group.company}) \u2192 ${data.to}\nPředmět: ${data.subject}`);
            } catch (err) {
              showResult(err.message || 'Neočekávaná chyba při odeslání skupiny.', true);
              groupSendBtn.disabled = false;
              groupSendBtn.textContent = original;
            }
          });

          groupHeader.appendChild(groupSubjectInput);
          groupHeader.appendChild(groupSendBtn);
          section.appendChild(groupHeader);

          for (const file of group.files) {
            totalFiles++;
            const row = document.createElement('div');
            row.className = 'item';
            row.dataset.fileId = file.id;

            if (sentIds.has(file.id)) {
              row.classList.add('sent');
            }

            const check = document.createElement('input');
            check.type = 'checkbox';
            check.className = 'item-check';
            check.dataset.fileId = file.id;
            check.addEventListener('change', updateSelectAll);

            const meta = document.createElement('div');
            const fileName = document.createElement('div');
            fileName.className = 'file-name';
            fileName.textContent = file.filename;

            if (sentIds.has(file.id)) {
              const badge = document.createElement('span');
              badge.className = 'sent-badge';
              badge.textContent = 'Odesláno';
              fileName.appendChild(badge);
            }

            const subject = document.createElement('div');
            subject.className = 'subject';
            subject.textContent = `Předmět: ${file.subject || ''}`;

            meta.appendChild(fileName);
            meta.appendChild(subject);

            const actions = document.createElement('div');
            actions.className = 'item-actions';

            const fileSendBtn = document.createElement('button');
            fileSendBtn.type = 'button';
            fileSendBtn.className = 'send-btn';
            fileSendBtn.textContent = sentIds.has(file.id) ? 'Odesláno' : 'Odeslat';
            fileSendBtn.disabled = !isLoggedIn || sentIds.has(file.id);
            fileSendBtn.addEventListener('click', async () => {
              const original = fileSendBtn.textContent;
              fileSendBtn.disabled = true;
              fileSendBtn.textContent = 'Odesílám...';
              try {
                const response = await fetch(`/api/send/${encodeURIComponent(file.id)}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ subject: file.subject || '' }),
                });
                const data = await parseApiResponse(response);
                if (!response.ok) {
                  throw new Error(data.error || 'Odeslání selhalo');
                }
                markAsSent(file.id, row);
                fileSendBtn.textContent = 'Odesláno';
                showResult(`Odesláno: ${data.filename} \u2192 ${data.to}\nPředmět: ${data.subject}`);
              } catch (err) {
                showResult(err.message || 'Neočekávaná chyba při odeslání.', true);
                fileSendBtn.disabled = false;
                fileSendBtn.textContent = original;
              }
            });
            actions.appendChild(fileSendBtn);

            row.appendChild(check);
            row.appendChild(meta);
            row.appendChild(actions);
            section.appendChild(row);
          }

          groupsEl.appendChild(section);
        }

        const hasGroups = groups.length > 0;
        batchControls.style.display = hasGroups ? 'grid' : 'none';
        clearAllWrap.style.display = hasGroups ? 'block' : 'none';
        selectAllRow.style.display = hasGroups ? 'flex' : 'none';
        selectAllCb.checked = false;
        selectAllCb.indeterminate = false;
        sendSelectedBtn.disabled = !isLoggedIn;
        removeSelectedBtn.disabled = !isLoggedIn;
        updateFileCount(totalFiles);
      }

      function selectedFileIds() {
        return Array.from(document.querySelectorAll('.item-check:checked'))
          .map((el) => el.dataset.fileId)
          .filter(Boolean);
      }

      selectAllCb.addEventListener('change', () => {
        const checked = selectAllCb.checked;
        document.querySelectorAll('.item-check').forEach((cb) => { cb.checked = checked; });
      });

      function updateAuthUi(status) {
        isLoggedIn = !!status.loggedIn;
        sortBtn.disabled = !isLoggedIn;

        if (isLoggedIn) {
          const label = status.userEmail ? `Přihlášen: ${status.userEmail}` : 'Přihlášen';
          authStatus.textContent = label;
          authStatus.classList.add('ok');
          loginBtn.style.display = 'none';
          logoutBtn.style.display = 'inline-block';
        } else {
          authStatus.textContent = 'Nepřihlášen';
          authStatus.classList.remove('ok');
          loginBtn.style.display = 'inline-block';
          logoutBtn.style.display = 'none';
        }
        sendSelectedBtn.disabled = !isLoggedIn;
        removeSelectedBtn.disabled = !isLoggedIn;
      }

      async function loadAuthStatus() {
        try {
          const response = await fetch('/api/auth-status');
          const data = await response.json();
          updateAuthUi(data);
        } catch {
          updateAuthUi({ loggedIn: false });
        }
      }

      /* ---- Drag & Drop with file accumulation ---- */
      function addFiles(fileList) {
        const existingNames = new Set(pendingFiles.map((f) => f.name + f.size));
        for (const file of fileList) {
          if (!existingNames.has(file.name + file.size)) {
            pendingFiles.push(file);
          }
        }
        renderPendingFiles();
      }

      function removePendingFile(index) {
        pendingFiles.splice(index, 1);
        renderPendingFiles();
      }

      function renderPendingFiles() {
        dropZoneFiles.innerHTML = '';
        for (let i = 0; i < pendingFiles.length; i++) {
          const chip = document.createElement('span');
          chip.className = 'pending-chip';

          const nameSpan = document.createElement('span');
          nameSpan.textContent = pendingFiles[i].name;
          chip.appendChild(nameSpan);

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.textContent = '\u00d7';
          removeBtn.title = 'Odebrat';
          removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            removePendingFile(i);
          });
          chip.appendChild(removeBtn);

          dropZoneFiles.appendChild(chip);
        }
      }

      dropZone.addEventListener('click', () => filesInput.click());

      filesInput.addEventListener('change', () => {
        if (filesInput.files && filesInput.files.length > 0) {
          addFiles(filesInput.files);
          filesInput.value = '';
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const dt = e.dataTransfer;
        if (dt.files && dt.files.length > 0) {
          addFiles(dt.files);
        }
      });

      /* ---- Auth ---- */
      loginBtn.addEventListener('click', () => {
        window.location.href = '/auth/login';
      });

      logoutBtn.addEventListener('click', async () => {
        await fetch('/auth/logout', { method: 'POST' });
        updateAuthUi({ loggedIn: false });
        groupsEl.innerHTML = '';
        commonSubjectInput.value = '';
        batchControls.style.display = 'none';
        clearAllWrap.style.display = 'none';
        selectAllRow.style.display = 'none';
        fileCountEl.style.display = 'none';
        sentIds.clear();
        pendingFiles = [];
        renderPendingFiles();
      });

      /* ---- Batch actions ---- */
      removeSelectedBtn.addEventListener('click', async () => {
        if (!isLoggedIn) {
          showResult('Nejdřív se přihlas přes Microsoft.', true);
          return;
        }

        const ids = selectedFileIds();
        if (ids.length === 0) {
          showResult('Vyber aspoň jeden soubor k odebrání.', true);
          return;
        }

        const original = removeSelectedBtn.textContent;
        removeSelectedBtn.disabled = true;
        removeSelectedBtn.textContent = 'Odebírám...';

        try {
          const response = await fetch('/api/remove-batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids }),
          });
          const data = await parseApiResponse(response);
          if (!response.ok) {
            throw new Error(data.error || 'Odebrání selhalo');
          }
          for (const id of ids) sentIds.delete(id);
          renderGroups(data.groups || []);
          showResult(`Odebráno: ${data.removed}. Celkem v seznamu: ${data.total}.`);
        } catch (err) {
          showResult(err.message || 'Neočekávaná chyba při odebírání.', true);
        } finally {
          removeSelectedBtn.disabled = !isLoggedIn;
          removeSelectedBtn.textContent = original;
        }
      });

      clearAllBtn.addEventListener('click', async () => {
        if (!isLoggedIn) {
          showResult('Nejdřív se přihlas přes Microsoft.', true);
          return;
        }

        clearAllBtn.disabled = true;
        clearAllBtn.textContent = 'Mažu...';

        try {
          const response = await fetch('/api/clear-all', { method: 'POST' });
          const data = await parseApiResponse(response);
          if (!response.ok) {
            throw new Error(data.error || 'Smazání selhalo');
          }
          sentIds.clear();
          groupsEl.innerHTML = '';
          batchControls.style.display = 'none';
          clearAllWrap.style.display = 'none';
          selectAllRow.style.display = 'none';
          fileCountEl.style.display = 'none';
          commonSubjectInput.value = '';
          result.style.display = 'none';
        } catch (err) {
          showResult(err.message || 'Neočekávaná chyba při mazání.', true);
        } finally {
          clearAllBtn.disabled = false;
          clearAllBtn.textContent = 'Smazat vše';
        }
      });

      sendSelectedBtn.addEventListener('click', async () => {
        if (!isLoggedIn) {
          showResult('Nejdřív se přihlas přes Microsoft.', true);
          return;
        }

        const ids = selectedFileIds();
        if (ids.length === 0) {
          showResult('Vyber aspoň jeden soubor k hromadnému odeslání.', true);
          return;
        }

        const original = sendSelectedBtn.textContent;
        sendSelectedBtn.disabled = true;
        sendSelectedBtn.textContent = 'Odesílám vybrané...';

        try {
          const response = await fetch('/api/send-batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ids,
              subject: commonSubjectInput.value || '',
            }),
          });
          const data = await parseApiResponse(response);
          if (!response.ok) {
            throw new Error(data.error || 'Hromadné odeslání selhalo');
          }
          for (const id of ids) {
            const row = document.querySelector(`.item[data-file-id="${id}"]`);
            if (row) markAsSent(id, row);
          }
          showResult(`Odesláno souborů: ${data.count} \u2192 ${data.to}\nPředmět: ${data.subject}`);
        } catch (err) {
          showResult(err.message || 'Neočekávaná chyba při hromadném odeslání.', true);
        } finally {
          sendSelectedBtn.disabled = !isLoggedIn;
          sendSelectedBtn.textContent = original;
        }
      });

      /* ---- Upload & sort ---- */
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        result.style.display = 'none';
        result.classList.remove('error');

        if (!isLoggedIn) {
          showResult('Nejdřív se přihlas přes Microsoft.', true);
          return;
        }

        if (pendingFiles.length === 0) {
          showResult('Vyber aspoň jeden soubor.', true);
          return;
        }

        sortBtn.disabled = true;
        sortBtn.textContent = 'Třídím...';

        try {
          const formData = new FormData();
          for (const file of pendingFiles) {
            formData.append('files', file);
          }

          const response = await fetch('/api/sort', {
            method: 'POST',
            body: formData,
          });

          const data = await parseApiResponse(response);
          if (!response.ok) {
            throw new Error(data.error || 'Chyba při třídění');
          }

          renderGroups(data.groups || []);
          pendingFiles = [];
          renderPendingFiles();
          showResult(`Hotovo. Přidáno: ${data.added ?? 0}. Celkem v seznamu: ${data.total}.`);
        } catch (err) {
          groupsEl.innerHTML = '';
          batchControls.style.display = 'none';
          clearAllWrap.style.display = 'none';
          selectAllRow.style.display = 'none';
          fileCountEl.style.display = 'none';
          showResult(err.message || 'Neočekávaná chyba.', true);
        } finally {
          sortBtn.disabled = !isLoggedIn;
          sortBtn.textContent = 'Přidat a roztřídit faktury';
        }
      });

      const url = new URL(window.location.href);
      if (url.searchParams.get('login') === 'error') {
        showResult(url.searchParams.get('message') || 'Chyba přihlášení Microsoft.', true);
      }

      loadAuthStatus();
    </script>
  </body>
</html>
