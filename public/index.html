<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Email Sender</title>
    <style>
      :root {
        --bg: #f6f8ff;
        --card: #ffffff;
        --text: #172033;
        --muted: #5a6884;
        --accent: #0d6efd;
        --ok-bg: #dcfce7;
        --ok-text: #14532d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 10%, #dbeafe, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(700px, 100%);
        background: var(--card);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 15px 40px rgba(23, 32, 51, 0.1);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.3rem, 2.8vw, 1.8rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .auth-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .status-pill {
        padding: 8px 10px;
        border-radius: 10px;
        background: #e5e7eb;
        font-size: 0.88rem;
      }

      .status-pill.ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      input, textarea, button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #c7d2fe;
        padding: 10px 12px;
        font: inherit;
      }

      textarea { min-height: 90px; resize: vertical; }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        font-weight: 600;
        cursor: pointer;
      }

      button[disabled] { opacity: 0.6; cursor: not-allowed; }

      .result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        background: #eef4ff;
        white-space: pre-wrap;
        font-size: 0.92rem;
      }

      .error { background: #fee2e2; color: #7f1d1d; }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>AI Email Sender</h1>
      <p>Nahraj PDF/obrázek, AI vytvoří předmět + tělo a email se odešle z tvého Microsoft účtu.</p>

      <div class="auth-row">
        <button id="loginBtn" type="button">Přihlásit Microsoft</button>
        <button id="logoutBtn" type="button" style="display:none; background:#475569;">Odhlásit</button>
        <span id="authStatus" class="status-pill">Neověřeno</span>
      </div>

      <form id="mail-form">
        <div>
          <label>Cílový email</label>
          <input type="text" value="faktury.jic@inbox.grit.cz" disabled />
        </div>

        <div>
          <label for="subject">Předmět (volitelně)</label>
          <input id="subject" name="subject" type="text" maxlength="120" placeholder="Když nevyplníš, navrhne ho AI." />
        </div>

        <div>
          <label for="file">Příloha (PDF nebo obrázek)</label>
          <input id="file" name="file" type="file" accept="application/pdf,image/*" required />
        </div>

        <div>
          <label for="note">Volitelná poznámka pro AI</label>
          <textarea id="note" name="note" placeholder="Např. zvýrazni částku a datum splatnosti."></textarea>
        </div>

        <button id="submitBtn" type="submit">Zpracovat a odeslat</button>
      </form>

      <div class="muted" style="margin-top:10px;">
        Nejdřív se přihlas přes Microsoft. Email pak odejde z tvé přihlášené schránky.
      </div>

      <div id="result" class="result" style="display:none;"></div>
    </main>

    <script>
      const form = document.getElementById('mail-form');
      const result = document.getElementById('result');
      const submitBtn = document.getElementById('submitBtn');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const authStatus = document.getElementById('authStatus');
      let isLoggedIn = false;

      function showResult(text, isError = false) {
        result.textContent = text;
        result.style.display = 'block';
        result.classList.toggle('error', isError);
      }

      function updateAuthUi(status) {
        isLoggedIn = !!status.loggedIn;
        submitBtn.disabled = !isLoggedIn;

        if (isLoggedIn) {
          const label = status.userEmail ? `Přihlášen: ${status.userEmail}` : 'Přihlášen';
          authStatus.textContent = label;
          authStatus.classList.add('ok');
          loginBtn.style.display = 'none';
          logoutBtn.style.display = 'inline-block';
        } else {
          authStatus.textContent = 'Nepřihlášen';
          authStatus.classList.remove('ok');
          loginBtn.style.display = 'inline-block';
          logoutBtn.style.display = 'none';
        }
      }

      async function loadAuthStatus() {
        try {
          const response = await fetch('/api/auth-status');
          const data = await response.json();
          updateAuthUi(data);
        } catch {
          updateAuthUi({ loggedIn: false });
        }
      }

      loginBtn.addEventListener('click', () => {
        window.location.href = '/auth/login';
      });

      logoutBtn.addEventListener('click', async () => {
        await fetch('/auth/logout', { method: 'POST' });
        updateAuthUi({ loggedIn: false });
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        result.style.display = 'none';
        result.classList.remove('error');

        if (!isLoggedIn) {
          showResult('Nejdřív se přihlas přes Microsoft.', true);
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Odesílám...';

        try {
          const formData = new FormData(form);
          const response = await fetch('/api/send', {
            method: 'POST',
            body: formData,
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Chyba při odesílání');
          }

          showResult([
            'Email byl úspěšně odeslán.',
            `Odesláno z: ${data.from || '-'}`,
            `Odesláno na: ${data.to || 'faktury.jic@inbox.grit.cz'}`,
            `Předmět: ${data.subject}`,
            '',
            'Náhled těla:',
            data.previewBody,
          ].join('\n'));
        } catch (err) {
          showResult(err.message || 'Neočekávaná chyba.', true);
        } finally {
          submitBtn.disabled = !isLoggedIn;
          submitBtn.textContent = 'Zpracovat a odeslat';
        }
      });

      const url = new URL(window.location.href);
      if (url.searchParams.get('login') === 'error') {
        showResult(url.searchParams.get('message') || 'Chyba přihlášení Microsoft.', true);
      }

      loadAuthStatus();
    </script>
  </body>
</html>
