<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Třídič Faktur</title>
    <style>
      :root {
        --bg: #f6f8ff;
        --card: #ffffff;
        --text: #172033;
        --muted: #5a6884;
        --accent: #0d6efd;
        --ok-bg: #dcfce7;
        --ok-text: #14532d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 10%, #dbeafe, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(900px, 100%);
        background: var(--card);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 15px 40px rgba(23, 32, 51, 0.1);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.3rem, 2.8vw, 1.8rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .auth-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .status-pill {
        padding: 8px 10px;
        border-radius: 10px;
        background: #e5e7eb;
        font-size: 0.88rem;
      }

      .status-pill.ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      input, button, a.button-link {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #c7d2fe;
        padding: 10px 12px;
        font: inherit;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        font-weight: 600;
        cursor: pointer;
      }

      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        background: #eef4ff;
        white-space: pre-wrap;
        font-size: 0.92rem;
      }

      .error {
        background: #fee2e2;
        color: #7f1d1d;
      }

      .groups {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .group {
        border: 1px solid #dbe3ff;
        border-radius: 12px;
        padding: 12px;
        background: #f9fbff;
      }

      .group h3 {
        margin: 0 0 10px;
      }

      .item {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr auto;
        align-items: center;
        border-top: 1px solid #e7ecff;
        padding: 10px 0;
      }

      .item:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .file-name {
        font-weight: 600;
        font-size: 0.95rem;
      }

      .subject {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .download-btn {
        display: inline-block;
        text-decoration: none;
        background: #2563eb;
        color: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 0.88rem;
      }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }

      @media (max-width: 640px) {
        .item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>AI Třídič Faktur</h1>
      <p>Nahraj více faktur. AI je roztřídí podle firmy a navrhne předmět pro každý soubor.</p>

      <div class="auth-row">
        <button id="loginBtn" type="button">Přihlásit Microsoft</button>
        <button id="logoutBtn" type="button" style="display:none; background:#475569;">Odhlásit</button>
        <span id="authStatus" class="status-pill">Neověřeno</span>
      </div>

      <form id="sort-form">
        <div>
          <label for="files">Faktury (PDF nebo obrázky)</label>
          <input id="files" name="files" type="file" accept="application/pdf,image/*" multiple required />
        </div>

        <button id="sortBtn" type="submit">Roztřídit faktury</button>
      </form>

      <div class="muted" style="margin-top:10px;">
        Po roztřídění můžeš každý soubor stáhnout jedním kliknutím.
      </div>

      <div id="result" class="result" style="display:none;"></div>
      <div id="groups" class="groups"></div>
    </main>

    <script>
      const form = document.getElementById('sort-form');
      const result = document.getElementById('result');
      const groupsEl = document.getElementById('groups');
      const sortBtn = document.getElementById('sortBtn');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const authStatus = document.getElementById('authStatus');
      const filesInput = document.getElementById('files');
      let isLoggedIn = false;

      function showResult(text, isError = false) {
        result.textContent = text;
        result.style.display = 'block';
        result.classList.toggle('error', isError);
      }

      function renderGroups(groups) {
        groupsEl.innerHTML = '';
        for (const group of groups) {
          const section = document.createElement('section');
          section.className = 'group';

          const heading = document.createElement('h3');
          heading.textContent = group.company;
          section.appendChild(heading);

          for (const file of group.files) {
            const row = document.createElement('div');
            row.className = 'item';

            const meta = document.createElement('div');
            const fileName = document.createElement('div');
            fileName.className = 'file-name';
            fileName.textContent = file.filename;

            const subject = document.createElement('div');
            subject.className = 'subject';
            subject.textContent = `Předmět: ${file.subject}`;

            meta.appendChild(fileName);
            meta.appendChild(subject);

            const download = document.createElement('a');
            download.className = 'download-btn';
            download.href = `/api/download/${encodeURIComponent(file.id)}`;
            download.textContent = 'Stáhnout soubor';

            row.appendChild(meta);
            row.appendChild(download);
            section.appendChild(row);
          }

          groupsEl.appendChild(section);
        }
      }

      function updateAuthUi(status) {
        isLoggedIn = !!status.loggedIn;
        sortBtn.disabled = !isLoggedIn;

        if (isLoggedIn) {
          const label = status.userEmail ? `Přihlášen: ${status.userEmail}` : 'Přihlášen';
          authStatus.textContent = label;
          authStatus.classList.add('ok');
          loginBtn.style.display = 'none';
          logoutBtn.style.display = 'inline-block';
        } else {
          authStatus.textContent = 'Nepřihlášen';
          authStatus.classList.remove('ok');
          loginBtn.style.display = 'inline-block';
          logoutBtn.style.display = 'none';
        }
      }

      async function loadAuthStatus() {
        try {
          const response = await fetch('/api/auth-status');
          const data = await response.json();
          updateAuthUi(data);
        } catch {
          updateAuthUi({ loggedIn: false });
        }
      }

      loginBtn.addEventListener('click', () => {
        window.location.href = '/auth/login';
      });

      logoutBtn.addEventListener('click', async () => {
        await fetch('/auth/logout', { method: 'POST' });
        updateAuthUi({ loggedIn: false });
        groupsEl.innerHTML = '';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        result.style.display = 'none';
        result.classList.remove('error');

        if (!isLoggedIn) {
          showResult('Nejdřív se přihlas přes Microsoft.', true);
          return;
        }

        const files = filesInput.files ? Array.from(filesInput.files) : [];
        if (files.length === 0) {
          showResult('Vyber aspoň jeden soubor.', true);
          return;
        }

        sortBtn.disabled = true;
        sortBtn.textContent = 'Třídím...';

        try {
          const formData = new FormData();
          for (const file of files) {
            formData.append('files', file);
          }

          const response = await fetch('/api/sort', {
            method: 'POST',
            body: formData,
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Chyba při třídění');
          }

          renderGroups(data.groups || []);
          showResult(`Hotovo. Roztříděno souborů: ${data.total}.`);
        } catch (err) {
          groupsEl.innerHTML = '';
          showResult(err.message || 'Neočekávaná chyba.', true);
        } finally {
          sortBtn.disabled = !isLoggedIn;
          sortBtn.textContent = 'Roztřídit faktury';
        }
      });

      const url = new URL(window.location.href);
      if (url.searchParams.get('login') === 'error') {
        showResult(url.searchParams.get('message') || 'Chyba přihlášení Microsoft.', true);
      }

      loadAuthStatus();
    </script>
  </body>
</html>
